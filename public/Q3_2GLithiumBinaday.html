<!DOCTYPE html>
<html>
<head>
   <meta charset = "UTF-8">
   <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
   <meta name = "description" content = "3Q 2nd Graded Exercise">
   <meta name = "keywords" content = "3Q, Portfolio, Projects, Web Development">
   <meta name = "author" content = "BINADAY, Aliya Louise B.">
</head>
<style>
  body {
    background-color: #fde6e4;
    font-family: "Trebuchet MS", sans-serif;
    color: #355f3b;
  }

  form {
    max-width: 700px;
    margin: 40px auto;
    background-color: #deb1a6;
    padding: 30px;
    border-radius: 20px;
  }

  fieldset {
    border: 3px solid #4f6f52;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    background-color: #f5d6d3;
  }

  legend {
    font-weight: bold;
    font-size: 18px;
    padding: 0 10px;
  }

  label {
    display: block;
    margin-bottom: 15px;
    font-weight: bold;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    border: 2px solid #8aa874;
    box-sizing: border-box;
    font-size: 14px;
  }

  input[type="radio"] {
    width: auto;
    margin-right: 6px;
  }

  textarea {
    resize: none;
  }

  .radio-group {
    margin-top: 6px;
  }

  .buttons {
  display: flex;
  justify-content: center; 
  gap: 20px;              
  margin-top: 20px;
  }

  .buttons input {
  width: 140px;
  }

  input:focus,
  select:focus,
  textarea:focus {
  outline: none;
  border-color: #4f6f52;
  box-shadow: 0 0 6px rgba(79, 111, 82, 0.6);
  }

  input[type="submit"],
  input[type="reset"] {
    background-color: #8aa874;
    color: white;
    border: none;
    padding: 12px 30px;
    margin: 10px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }

  input[type="submit"]:hover,
  input[type="reset"]:hover {
  background-color: #6f8f5f;
  }
</style>
<script>
    function confirmSubmit() {
      return confirm("Are you sure you want to submit this application?");
    }

    function confirmReset() {
      return confirm("Are you sure you want to reset the form?");
    }

    function checkEmpty(field) {
      if (field.value.trim() === "") {
        field.classList.add("error");
      } else {
        field.classList.remove("error");
      }
    }
</script>
<body>

<form method="post" action="submit" onsubmit="return confirmSubmit()" onreset="return confirmReset()">

  <fieldset>
    <label>
      Student ID:<br>
      <input type="number" name="studentID" required onblur="checkEmpty(this)">
    </label><br><br>

    <label>
      Full Name:<br>
      <input type="text" name="fullname" required onblur="checkEmpty(this)">
    </label><br><br>

    <label>
      Birthday:<br>
      <input type="date" name="birthday" required>
    </label><br><br>

    <label>
      Email Address:<br>
      <input type="email" name="email" required onblur="checkEmpty(this)">
    </label>
  </fieldset><br>

  <fieldset>
    <label>
      Mobile Phone:<br>
      <input type="text" name="mobile" required onblur="checkEmpty(this)">
    </label><br><br>

    <label>
      Grade Level:<br>
      <select name="gradelevel" required>
        <option value="g7">Grade 7</option>
        <option value="g8">Grade 8</option>
        <option value="g9">Grade 9</option>
        <option value="g10">Grade 10</option>
        <option value="g11">Grade 11</option>
        <option value="g12">Grade 12</option>
      </select>
    </label><br><br>

    <label>
      Intern / Extern:<br>
      <input type="radio" name="status" value="I" required> Intern
      <input type="radio" name="status" value="E"> Extern
    </label><br><br>

    <label>
      Preferred Organization / Club:<br>
      <select name="orgclub" required>
          <option value="orgclub1">Likha</option>
          <option value="orgclub2">Sapienara</option></option>
          <option value="orgclub3">Math Club</option>
          <option value="orgclub4">Lagablab</option>
          <option value="orgclub5">Solace</option>
          <option value="orgclub6">The Science Scholar</option>
      </select>
    </label><br><br>

    <label>
      Why do you want to join?<br>
      <textarea name="reason" rows="4" cols="40" required></textarea>
    </label>
  </fieldset><br>

  <div class="buttons">
  <input type="submit" value="Submit">
  <input type="reset" value="Reset">
  </div>

</form>

</body>
</html>
