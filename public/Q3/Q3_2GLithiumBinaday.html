<!DOCTYPE html>
<html>
<head>
   <meta charset = "UTF-8">
   <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
   <meta name = "description" content = "3Q 2nd Graded Exercise">
   <meta name = "keywords" content = "3Q, Portfolio, Projects, Web Development">
   <meta name = "author" content = "BINADAY, Aliya Louise B.">
</head>
<style>
  body {
    background-color: #fde6e4;
    font-family: "Trebuchet MS", sans-serif;
    color: #355f3b;
  }

  form {
    max-width: 700px;
    margin: 40px auto;
    background-color: #deb1a6;
    padding: 30px;
    border-radius: 20px;
  }

  fieldset {
    border: 3px solid #4f6f52;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    background-color: #f5d6d3;
  }

  legend {
    font-weight: bold;
    font-size: 18px;
    padding: 0 10px;
  }

  label {
    display: block;
    margin-bottom: 15px;
    font-weight: bold;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    border: 2px solid #8aa874;
    box-sizing: border-box;
    font-size: 14px;
  }

  input[type="radio"] {
    width: auto;
    margin-right: 6px;
  }

  textarea {
    resize: none;
  }

  .radio-group {
    margin-top: 6px;
  }

  input:focus,
  select:focus,
  textarea:focus {
  outline: none;
  border-color: #4f6f52;
  box-shadow: 0 0 6px rgba(79, 111, 82, 0.6);
  }

  input[type="submit"],
  input[type="reset"] {
    background-color: #8aa874;
    color: white;
    border: none;
    padding: 12px 30px;
    margin: 10px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }

  input[type="submit"]:hover,
  input[type="reset"]:hover {
  background-color: #6f8f5f;
  }

  .buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .buttons input, .buttons button {
    width: 140px;
    padding: 12px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    background-color: #8aa874;
    color: white;
  }

  .buttons input:hover,
  .buttons button:hover {
    background-color: #6f8f5f;
  }
</style>
<script>
    function confirmSubmit() {
      return confirm("Are you sure you want to submit this application?");
    }

    function confirmReset() {
      return confirm("Are you sure you want to reset the form?");
    }

    function checkEmpty(field) {
      if (field.value.trim() === "") {
        field.classList.add("error");
      } else {
        field.classList.remove("error");
      }
    }

    function saveSignup(event) {
    event.preventDefault();

    if (!confirmSubmit()) return;

    let signup = {
      studentID: document.querySelector("[name='studentID']").value,
      fullname: document.querySelector("[name='fullname']").value,
      birthday: document.querySelector("[name='birthday']").value,
      email: document.querySelector("[name='email']").value,
      mobile: document.querySelector("[name='mobile']").value,
      gradelevel: document.querySelector("[name='gradelevel']").value,
      status: document.querySelector("input[name='status']:checked").value,
      club: document.querySelector("[name='orgclub']").value,
      reason: document.querySelector("[name='reason']").value
    };

    let signups = JSON.parse(localStorage.getItem("signups")) || [];
    signups.push(signup);
    localStorage.setItem("signups", JSON.stringify(signups));

    alert("Sign-up saved successfully!");
    event.target.reset();
    }

    function viewSignups() {
    window.location.href = "viewSignUps.html";
    }
</script>
<body>

<form onsubmit="saveSignup(event)" onreset="return confirmReset()">

  <fieldset>
    <label>
      Student ID:<br>
      <input type="number" name="studentID" required onblur="checkEmpty(this)">
    </label><br><br>

    <label>
      Full Name:<br>
      <input type="text" name="fullname" required onblur="checkEmpty(this)">
    </label><br><br>

    <label>
      Birthday:<br>
      <input type="date" name="birthday" required>
    </label><br><br>

    <label>
      Email Address:<br>
      <input type="email" name="email" required onblur="checkEmpty(this)">
    </label>
  </fieldset><br>

  <fieldset>
    <label>
      Mobile Phone:<br>
      <input type="text" name="mobile" required onblur="checkEmpty(this)">
    </label><br><br>

    <label>
      Grade Level:<br>
      <select name="gradelevel" required>
        <option value="N/A">- select an option -</option>
        <option value="Grade 7">Grade 7</option>
        <option value="Grade 8">Grade 8</option>
        <option value="Grade 9">Grade 9</option>
        <option value="Grade 10">Grade 10</option>
        <option value="Grade 11">Grade 11</option>
        <option value="Grade 12">Grade 12</option>
      </select>
    </label><br><br>

    <label>
      Intern / Extern:<br>
      <input type="radio" name="status" value="Intern" required> Intern
      <input type="radio" name="status" value="Extern" required> Extern
    </label><br><br>

    <label>
      Preferred Organization / Club:<br>
      <select name="orgclub" required>
          <option value="N/A">- select an option -</option>
          <option value="Likha">Likha</option>
          <option value="Sapienara">Sapienara</option>
          <option value="Math Club">Math Club</option>
          <option value="Lagablab">Lagablab</option>
          <option value="Solace">Solace</option>
          <option value="The Science Scholar">The Science Scholar</option>
      </select>
    </label><br><br>

    <label>
      Why do you want to join?<br>
      <textarea name="reason" rows="4" cols="40" required></textarea>
    </label>
  </fieldset><br>

  <div class="buttons">
  <input type="submit" value="Submit">
  <input type="reset" value="Reset">
  <button type="button" onclick="viewSignups()">View Signups</button>
  </div>

</form>

</body>
</html>
